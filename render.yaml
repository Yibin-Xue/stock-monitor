services:
  - type: web
    name: stock-monitor-backend
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 3003
      - key: NODE_ENV
        value: production
      - key: TUSHARE_TOKEN
        value: 493d8b1bd7edd1c8e716ca6b7af6eda08b176c130b297ea33d0e5c29
      - key: DOUBAO_API_KEY
        value: 9960c043-3452-40d1-814b-c8b8873843d1
      - key: DOUBAO_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: DOUBAO_MODEL
        value: doubao-seed-2-0-pro-260215
      - key: FRONTEND_URL
        fromService:
          type: web
          name: stock-monitor-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: stock-monitor-frontend
    env: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: stock-monitor-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
